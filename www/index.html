<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilates & Yoga Routine Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #f5f0ea;
      --surface: #ffffff;
      --surface2: #ece7e0;
      --accent: #5c6b4f;
      --accent2: #7a8a6c;
      --text: #3d3b2f;
      --text-mid: #7a7768;
      --text-dim: #a8a49a;
      --slate: #b8c4b8;
      --rose: #d4b5a8;
      --teal: #a8c4bf;
      --sage: #bcc4a8;
      --amber: #d4c4a0;
      --border: rgba(61,59,47,0.08);
      --border-bright: rgba(61,59,47,0.15);
      --radius: 14px;
      --radius-sm: 8px;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 540px; margin: 0 auto; padding: 0 16px; }

    /* ---- Buttons ---- */
    .btn {
      padding: 8px 14px;
      background: transparent;
      border: 1.5px solid var(--border-bright);
      color: var(--text);
      border-radius: 24px;
      cursor: pointer;
      font: 500 13px/1.4 'Inter', sans-serif;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn.danger:hover { background: #c45b5b; border-color: #c45b5b; color: #fff; }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.lg { padding: 10px 18px; font-weight: 600; }
    .btn.block { width: 100%; text-align: center; }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .routine-name { flex: 1; font: 500 24px/1.2 var(--font-serif); min-width: 0; word-break: break-word; letter-spacing: -0.3px; }
    .routine-name input {
      background: var(--surface); color: var(--text); border: 1.5px solid var(--border-bright);
      padding: 6px 10px; border-radius: var(--radius-sm); font: 500 24px var(--font-serif); width: 100%;
    }
    .discipline-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      background: transparent; border: 1.5px solid var(--border-bright); border-radius: 24px;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .discipline-badge:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ---- Progress ---- */
    .progress-section { margin-bottom: 16px; }
    .progress-bar {
      width: 100%; height: 6px; background: var(--surface2);
      border-radius: 3px; overflow: hidden; margin-bottom: 8px; border: 1px solid var(--border);
    }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; border-radius: 3px; }
    .progress-text { font-size: 12px; color: var(--text-mid); }
    .progress-row { display: flex; justify-content: space-between; align-items: center; }

    /* ---- Equipment Filter ---- */
    .eq-filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .eq-chip {
      padding: 6px 14px; background: transparent; border: 1.5px solid var(--border-bright);
      border-radius: 24px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .eq-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ---- Edit Top Bar ---- */
    .edit-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .edit-bar .btn { flex: 1; min-width: 80px; }

    /* ---- Block Cards ---- */
    .blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .block-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden; transition: all 0.2s;
      box-shadow: 0 1px 3px rgba(61,59,47,0.04);
    }
    .block-card:hover { border-color: var(--border-bright); box-shadow: 0 2px 8px rgba(61,59,47,0.08); }

    .block-header {
      display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer;
      background: var(--surface); border-bottom: 1.5px solid var(--border);
    }
    .block-emoji { font-size: 24px; min-width: 32px; text-align: center; }
    .block-info { flex: 1; min-width: 0; }
    .block-title { font: 500 17px/1.3 var(--font-serif); letter-spacing: -0.2px; }
    .block-title input {
      background: var(--surface); color: var(--text); border: 1.5px solid var(--border-bright);
      padding: 4px 8px; border-radius: var(--radius-sm); font: 500 17px var(--font-serif); width: 100%;
    }
    .eq-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .eq-badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
      background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 12px;
      font-size: 11px; font-weight: 500; color: var(--text-mid);
    }
    .toggle-arrow { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
    .toggle-arrow.collapsed { transform: rotate(-90deg); }
    .block-actions { display: flex; gap: 4px; align-items: center; }

    .block-content { display: flex; flex-direction: column; max-height: 2000px; overflow: hidden; transition: max-height 0.3s; }
    .block-content.collapsed { max-height: 0; }

    /* ---- Transition Card ---- */
    .transition-card {
      padding: 12px 16px; background: var(--surface2); border: 1.5px dashed var(--border-bright);
      border-radius: var(--radius); display: flex; align-items: center; gap: 12px; font-size: 13px;
      font-style: italic; color: var(--text-mid);
    }

    /* ---- Step Rows ---- */
    .step-row {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border);
    }
    .step-checkbox { width: 20px; height: 20px; min-width: 20px; margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
    .step-content { flex: 1; min-width: 0; }
    .step-emoji { font-size: 18px; margin-bottom: 4px; }
    .step-name { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
    .step-detail { font-size: 13px; color: var(--text-mid); }
    .step-row.checked { opacity: 0.5; }
    .step-row.checked .step-name { text-decoration: line-through; }

    .pulse-badge {
      display: inline-block; margin-left: 6px; padding: 2px 8px;
      background: var(--rose); color: var(--text);
      border-radius: 12px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ---- Quiz Mode ---- */
    .quiz-card { cursor: pointer; user-select: none; }
    .quiz-card .step-detail { display: none; }
    .quiz-card.revealed .step-detail { display: block; }
    .quiz-toggle {
      padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border-bright);
      border-radius: 12px; font-size: 11px; cursor: pointer; color: var(--text-mid); transition: all 0.2s;
    }
    .quiz-toggle:hover, .quiz-toggle.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    .add-step-btn {
      padding: 10px 16px; background: var(--surface2); border: 1px dashed var(--border-bright);
      color: var(--text-mid); border-radius: var(--radius-sm); cursor: pointer; font: 500 13px 'Inter', sans-serif;
      transition: all 0.2s; margin: 12px 16px;
    }
    .add-step-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .add-block-btn {
      padding: 12px 16px; background: var(--surface2); border: 2px dashed var(--border-bright);
      color: var(--text-mid); border-radius: var(--radius); cursor: pointer; font: 600 14px 'Inter', sans-serif;
      transition: all 0.2s; text-align: center; margin-bottom: 24px;
    }
    .add-block-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* ---- Edit Toolbar per block ---- */
    .edit-toolbar {
      display: flex; gap: 6px; align-items: center; padding: 8px 16px;
      background: rgba(255,255,255,0.02); flex-wrap: wrap;
    }

    /* ---- Library Panel ---- */
    .library-overlay {
      position: fixed; inset: 0; background: rgba(61,59,47,0.25); z-index: 8900; animation: fadeIn 0.2s;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .library-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 400px;
      background: var(--surface); border-left: 1.5px solid var(--border-bright); z-index: 9000;
      display: flex; flex-direction: column; animation: slideIn 0.3s; box-shadow: -8px 0 24px rgba(61,59,47,0.1);
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .library-header { padding: 16px; border-bottom: 1px solid var(--border-bright); display: flex; justify-content: space-between; align-items: center; }
    .library-title { font: 500 20px/1.2 var(--font-serif); }
    .library-content { flex: 1; overflow-y: auto; padding: 16px; }
    .library-empty { text-align: center; color: var(--text-mid); padding: 32px 16px; font-size: 14px; }

    .routine-card {
      background: var(--bg); border: 1.5px solid var(--border-bright); border-radius: var(--radius);
      padding: 14px; margin-bottom: 12px; transition: all 0.2s;
    }
    .routine-card:hover { border-color: var(--accent); }
    .routine-card-title { font: 500 16px/1.2 var(--font-serif); margin-bottom: 4px; }
    .routine-card-meta { font-size: 12px; color: var(--text-mid); margin-bottom: 8px; }
    .routine-card-btns { display: flex; gap: 8px; }
    .routine-card-btns .btn { flex: 1; }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(61,59,47,0.3);
      display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 16px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 1.5px solid var(--border-bright); border-radius: var(--radius);
      padding: 24px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(61,59,47,0.15);
    }
    .modal h3 { font: 500 22px/1.2 var(--font-serif); margin-bottom: 16px; }
    .modal p { color: var(--text-mid); font-size: 14px; margin-bottom: 16px; }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .form-input {
      background: var(--bg); border: 1.5px solid var(--border-bright); color: var(--text);
      padding: 10px 12px; border-radius: var(--radius-sm); font: 14px 'Inter', sans-serif;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .modal-btns { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }

    /* ---- Dropdown ---- */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-menu {
      position: absolute; top: 100%; right: 0; background: var(--surface);
      border: 1.5px solid var(--border-bright); border-radius: var(--radius-sm);
      min-width: 200px; z-index: 1000; margin-top: 4px; box-shadow: 0 8px 24px rgba(61,59,47,0.1);
    }
    .dropdown-menu button {
      width: 100%; text-align: left; padding: 10px 16px; background: none;
      border: none; border-bottom: 1px solid var(--border); color: var(--text);
      cursor: pointer; font-size: 13px; transition: background 0.2s;
    }
    .dropdown-menu button:last-child { border-bottom: none; }
    .dropdown-menu button:hover { background: var(--surface2); }

    /* ---- Utility ---- */
    .hidden { display: none !important; }
    .success { color: var(--accent); font-size: 12px; margin-top: 8px; }
    .error { color: #c45b5b; font-size: 12px; margin-top: 8px; }

    @media (max-width: 540px) {
      .container { padding: 0 12px; }
      .header { padding: 12px 0; }
      .edit-bar { flex-direction: column; }
      .edit-bar .btn { min-width: auto; min-height: 44px; font-size: 14px; }
      .library-panel { max-width: 100%; }
      .modal { padding: 16px; }
    }

    /* ---- Bottom Sheet ---- */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(61,59,47,0.25);
      z-index: 9500; opacity: 0; transition: opacity 0.25s;
      pointer-events: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--surface); border-top: 1px solid var(--border-bright);
      border-radius: 16px 16px 0 0; z-index: 9600;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      max-height: 85vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom, 16px);
      -webkit-overflow-scrolling: touch;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--text-dim); border-radius: 2px;
      margin: 10px auto 8px; opacity: 0.5;
    }
    .sheet-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 20px 12px; border-bottom: 1.5px solid var(--border);
    }
    .sheet-header h3 { font: 500 20px/1.2 var(--font-serif); }
    .sheet-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
    .sheet-field label {
      display: block; font-size: 12px; font-weight: 600; color: var(--text-mid);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .sheet-field input[type="text"],
    .sheet-field textarea {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border-bright); padding: 12px;
      border-radius: var(--radius-sm); font: 15px 'Inter', sans-serif;
      -webkit-appearance: none;
    }
    .sheet-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .sheet-field input:focus,
    .sheet-field textarea:focus { outline: none; border-color: var(--accent); }

    .color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-swatch {
      width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    }
    .color-swatch:active { transform: scale(0.9); }
    .color-swatch.selected { border-color: var(--accent); }

    .eq-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
    .eq-toggle {
      padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border-bright);
      border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    .eq-toggle.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
    .emoji-pick {
      width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 22px; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .emoji-pick:active { transform: scale(0.9); }
    .emoji-pick.selected { border-color: var(--accent); background: rgba(92,107,79,0.1); }

    .sheet-actions {
      display: flex; flex-direction: column; gap: 10px;
      padding: 16px 20px; border-top: 1px solid var(--border); margin-top: 8px;
    }
    .sheet-actions .btn { min-height: 48px; font-size: 15px; }
    .sheet-row-actions { display: flex; gap: 10px; }
    .sheet-row-actions .btn { flex: 1; }

    .pulse-toggle {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--bg); border: 1.5px solid var(--border-bright);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .pulse-toggle.active { border-color: var(--rose); background: rgba(212,181,168,0.2); }

    .step-edit-row {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-top: 1px solid var(--border); cursor: pointer;
      transition: background 0.15s; min-height: 52px;
      -webkit-tap-highlight-color: transparent;
    }
    .step-edit-row:active { background: var(--surface2); }
    .step-edit-row .step-emoji { font-size: 20px; min-width: 28px; text-align: center; }
    .step-edit-row .step-name { font-weight: 500; font-size: 14px; flex: 1; }
    .step-edit-row .step-name.empty { color: var(--text-dim); font-style: italic; }
    .step-edit-row .step-chevron { color: var(--text-dim); font-size: 16px; }

    .add-step-btn {
      min-height: 48px; display: flex; align-items: center; justify-content: center;
    }
    .add-block-btn {
      min-height: 52px; display: flex; align-items: center; justify-content: center;
    }

    /* ---- Confirm Overlay ---- */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(61,59,47,0.3);
      z-index: 11000; display: flex; align-items: flex-end;
      animation: fadeIn 0.15s;
    }
    .confirm-sheet {
      width: 100%; background: var(--surface);
      border-radius: 16px 16px 0 0; padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      border-top: 1.5px solid var(--border-bright);
    }
    .confirm-msg {
      font-size: 15px; color: var(--text); margin-bottom: 20px;
      text-align: center; line-height: 1.5;
    }
    .confirm-btns { display: flex; flex-direction: column; gap: 10px; }
    .confirm-btns .btn { min-height: 48px; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="routine-name" id="routineName"></div>
      <div class="discipline-badge" id="disciplineBadge" data-action="switch-discipline"></div>
      <button class="btn" id="editToggle" data-action="toggle-edit">✏️ Edit</button>
    </div>
    <div id="editBar" class="edit-bar hidden"></div>
    <div id="progressSection" class="progress-section"></div>
    <div id="eqFilter" class="eq-filter"></div>
    <div id="blocks" class="blocks"></div>
  </div>
  <div id="modalContainer"></div>
  <div id="libraryOverlay" class="library-overlay hidden" data-action="close-library"></div>
  <div id="libraryPanel" class="library-panel hidden">
    <div class="library-header">
      <div class="library-title">My Routines</div>
      <button class="btn" data-action="close-library">✕</button>
    </div>
    <div class="library-content" id="libraryContent"></div>
  </div>

  <!-- Bottom Sheet -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>

<script>
// ===== DATA =====

        { name: 'Hold Twist + Pulse', detail: 'Hold the right twist, pulse.', emoji: '🔥', tags: ['pulse'] },
        { name: 'Add Right Leg Lift + Twist', detail: 'Lift right leg as you twist, full range.', emoji: '🦵', tags: [] },
        { name: 'Pulse — Leg Up, Hold Twist', detail: 'Pulse with right leg up, holding the twist.', emoji: '🔥', tags: ['pulse'] },

const S = {
  routineId: null,
  routineName: 'Mat Pilates',
  discipline: 'pilates',
  blocks: JSON.parse(JSON.stringify(PILATES_DEFAULT.blocks)),
  checked: {},
  collapsed: {},
  editMode: false,
  quizMode: {},
  quizRevealed: {},
  eqFilter: new Set(),
};

function saveState() {
  const data = {
    routineId: S.routineId,
    routineName: S.routineName,
    discipline: S.discipline,
    blocks: S.blocks,
    checked: S.checked,
    collapsed: Object.fromEntries(Object.entries(S.collapsed)),
  };
  localStorage.setItem('current_state', JSON.stringify(data));
}

function loadState() {
  try {
    const raw = localStorage.getItem('current_state');
    if (!raw) return;
    const data = JSON.parse(raw);
    S.routineId = data.routineId || null;
    S.routineName = data.routineName || 'My Routine';
    S.discipline = data.discipline || 'pilates';
    S.blocks = data.blocks || [];
    S.checked = data.checked || {};
    S.collapsed = data.collapsed || {};
  } catch(e) { /* ignore corrupt data */ }
}

function getRoutines() {
  try { return JSON.parse(localStorage.getItem('routines_library') || '[]'); }
  catch(e) { return []; }
}

function saveRoutineToLibrary(name) {
  const routines = getRoutines();
  const id = 'r_' + Date.now();
  routines.push({
    id, name, discipline: S.discipline,
    savedAt: new Date().toISOString(),
    blocks: JSON.parse(JSON.stringify(S.blocks)),
  });
  localStorage.setItem('routines_library', JSON.stringify(routines));
  return id;
}

function loadRoutineFromLibrary(id) {
  const routines = getRoutines();
  const r = routines.find(x => x.id === id);
  if (!r) return;
  S.routineId = r.id;
  S.routineName = r.name;
  S.discipline = r.discipline;
  S.blocks = JSON.parse(JSON.stringify(r.blocks));
  S.checked = {};
  S.collapsed = {};
  S.quizMode = {};
  S.quizRevealed = {};
  saveState();
}

function deleteRoutineFromLibrary(id) {
  const routines = getRoutines().filter(x => x.id !== id);
  localStorage.setItem('routines_library', JSON.stringify(routines));
}

// ===== RENDER =====

function getEquipmentList() {
  const eq = new Set();
  S.blocks.forEach(b => (b.equipment || []).forEach(e => eq.add(e)));
  return [...eq].sort();
}

function shouldShow(block) {
  if (S.eqFilter.size === 0) return true;
  if (block.type === 'transition') return true;
  return (block.equipment || []).some(e => S.eqFilter.has(e));
}

function renderHeader() {
  const nameEl = document.getElementById('routineName');
  if (S.editMode) {
    if (!nameEl.querySelector('input')) {
      nameEl.innerHTML = `<input type="text" value="${esc(S.routineName)}" id="routineNameInput">`;
    }
  } else {
    nameEl.textContent = S.routineName;
  }

  const badge = document.getElementById('disciplineBadge');
  badge.textContent = S.discipline === 'yoga' ? '🧘 Yoga' : '🏋️ Pilates';

  const toggle = document.getElementById('editToggle');
  toggle.textContent = S.editMode ? '✅ Done' : '✏️ Edit';
  toggle.classList.toggle('active', S.editMode);

  const editBar = document.getElementById('editBar');
  if (S.editMode) {
    editBar.classList.remove('hidden');
    editBar.innerHTML = `
      <button class="btn lg primary" data-action="save-routine">💾 Save</button>
      <button class="btn lg" data-action="load-routines">📂 Routines</button>
      <button class="btn lg" data-action="open-quick-build">⚡ Quick Build</button>
      <div class="dropdown">
        <button class="btn lg" id="newBtn">📄 New</button>
        <div id="newMenu" class="dropdown-menu hidden">
          <button data-action="new-pilates">🏋️ New Pilates</button>
          <button data-action="new-yoga">🧘 New Yoga</button>
          <button data-action="new-blank">📄 Start Blank</button>
        </div>
      </div>
    `;
  } else {
    editBar.classList.add('hidden');
  }
}

function renderProgress() {
  const section = document.getElementById('progressSection');
  if (S.editMode) { section.innerHTML = ''; return; }

  const visible = S.blocks.filter(shouldShow);
  let total = 0, done = 0;
  visible.forEach((b, _) => {
    if (b.type === 'transition') return;
    const bi = S.blocks.indexOf(b);
    b.steps.forEach((_, si) => { total++; if (S.checked[`${bi}_${si}`]) done++; });
  });
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  section.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-row">
      <span class="progress-text">${pct}% complete</span>
      <button class="btn" data-action="start-fresh">Start Fresh</button>
    </div>
  `;
}

function renderEqFilter() {
  const el = document.getElementById('eqFilter');
  const eqs = getEquipmentList();
  if (eqs.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = eqs.map(e => {
    const info = EQUIPMENT[e] || { label: e, icon: '🔧' };
    return `<button class="eq-chip ${S.eqFilter.has(e) ? 'active' : ''}" data-action="toggle-eq" data-eq="${e}">${info.icon} ${info.label}</button>`;
  }).join('');
}

function renderBlocks() {
  const el = document.getElementById('blocks');
  const visible = S.blocks.filter(shouldShow);

  el.innerHTML = visible.map(block => {
    const bi = S.blocks.indexOf(block);
    if (block.type === 'transition') {
      return `<div class="transition-card"><span style="font-size:20px">${esc(block.emoji)}</span><span>${esc(block.title)}</span></div>`;
    }
    const isCollapsed = S.collapsed[bi] !== false;
    const isQuiz = S.quizMode[bi] === true;
    const eqHtml = (block.equipment || []).map(e => {
      const info = EQUIPMENT[e] || { label: e, icon: '🔧' };
      return `<span class="eq-badge">${info.icon} ${info.label}</span>`;
    }).join('');

    let content = '';
    if (S.editMode) {
      content = renderEditSteps(block, bi);
      content += `<div style="display:flex;gap:8px;padding:8px 16px">
        <button class="add-step-btn" style="flex:1" data-action="add-step" data-bi="${bi}">+ Add Step</button>
        <button class="add-step-btn" style="flex:1;border-color:var(--accent);color:var(--accent)" data-action="open-quick-add" data-bi="${bi}">⚡ Quick Add</button>
      </div>`;
    } else {
      content = block.steps.map((step, si) => {
        const key = `${bi}_${si}`;
        const checked = S.checked[key];
        const hasPulse = (step.tags || []).includes('pulse');
        if (isQuiz) {
          const revealed = S.quizRevealed[key];
          return `<div class="step-row quiz-card ${revealed ? 'revealed' : ''}" data-action="reveal-quiz" data-bi="${bi}" data-si="${si}">
            <div class="step-content">
              <div class="step-emoji">${esc(step.emoji)}</div>
              <div class="step-name">${esc(step.name)}${hasPulse ? '<span class="pulse-badge">PULSE</span>' : ''}</div>
              <div class="step-detail">${esc(step.detail)}</div>
            </div>
          </div>`;
        }
        return `<div class="step-row ${checked ? 'checked' : ''}" data-bi="${bi}" data-si="${si}">
          <input type="checkbox" class="step-checkbox" data-action="toggle-step" data-bi="${bi}" data-si="${si}" ${checked ? 'checked' : ''}>
          <div class="step-content">
            <div class="step-emoji">${esc(step.emoji)}</div>
            <div class="step-name">${esc(step.name)}${hasPulse ? '<span class="pulse-badge">PULSE</span>' : ''}</div>
            <div class="step-detail">${esc(step.detail)}</div>
          </div>
        </div>`;
      }).join('');
    }

    const editToolbar = '';

    const quizBtn = !S.editMode ? `<button class="quiz-toggle ${isQuiz ? 'active' : ''}" data-action="toggle-quiz" data-bi="${bi}">${isQuiz ? '❓ Quiz' : '📋 List'}</button>` : '';

    return `<div class="block-card" data-bi="${bi}">
      <div class="block-header" data-action="${S.editMode ? 'open-block-sheet' : 'toggle-collapse'}" data-bi="${bi}">
        <span class="block-emoji">${esc(block.emoji)}</span>
        <div class="block-info">
          <div class="block-title">${esc(block.title)}</div>
          <div class="eq-badges">${eqHtml}</div>
        </div>
        <div class="block-actions">
          ${S.editMode ? '<span style="color:var(--text-dim);font-size:14px">✎</span>' : quizBtn}
          <div class="toggle-arrow ${isCollapsed ? 'collapsed' : ''}">▾</div>
        </div>
      </div>
      ${editToolbar}
      <div class="block-content ${isCollapsed ? 'collapsed' : ''}">${content}</div>
    </div>`;
  }).join('');

  if (S.editMode) {
    el.innerHTML += `<button class="add-block-btn" data-action="add-block">+ Add Block</button>`;
  }
}

function renderEditSteps(block, bi) {
  if (block.steps.length === 0) {
    return `<div style="padding:16px;text-align:center;color:var(--text-mid);font-size:13px">No steps yet. Tap "+ Add Step" below.</div>`;
  }
  return block.steps.map((step, si) => {
    const hasPulse = (step.tags || []).includes('pulse');
    return `<div class="step-edit-row" data-action="open-step-sheet" data-bi="${bi}" data-si="${si}">
      <span class="step-emoji">${esc(step.emoji)}</span>
      <span class="step-name ${!step.name ? 'empty' : ''}">${step.name ? esc(step.name) : 'Tap to edit...'}${hasPulse ? ' <span class="pulse-badge">PULSE</span>' : ''}</span>
      <span class="step-chevron">›</span>
    </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  renderHeader();
  renderProgress();
  renderEqFilter();
  renderBlocks();
}

  const el = document.createElement('div');
  el.className = 'confirm-overlay';
  el.innerHTML = `
    <div class="confirm-sheet">
      <p class="confirm-msg">${esc(message)}</p>
      <div class="confirm-btns">

  document.body.appendChild(el);
  const cleanup = () => el.remove();
  el.querySelector('#confirmOk').addEventListener('click', () => { cleanup(); onConfirm(); });
  el.querySelector('#confirmCancel').addEventListener('click', cleanup);
  el.addEventListener('click', (ev) => { if (ev.target === el) cleanup(); });
}

      <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
        <strong>## Block Name</strong> = new block<br>
        <strong>---</strong> = transition<br>
        Each line = one exercise
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn lg primary block" data-action="confirm-quick-build">Build Routine</button>
    </div>
  `);
  setTimeout(() => document.getElementById('sheetQuickBuildText')?.focus(), 300);
}

function showDisciplineModal() {
  showModal(`
    <h3>Switch Discipline</h3>
    <p>Load a template to start fresh.</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <button class="btn lg block" data-action="switch-to-pilates">🏋️ Pilates Template</button>
      <button class="btn lg block" data-action="switch-to-yoga">🧘 Yoga Template</button>
    </div>
    <div class="modal-btns"><button class="btn" data-action="close-modal">Cancel</button></div>
  `);
}

// ===== EVENTS =====

document.addEventListener('click', (e) => {
  if (e.target.id === 'sheetOverlay') { closeSheet(); saveState(); render(); return; }
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const bi = el.dataset.bi != null ? parseInt(el.dataset.bi) : null;
  const si = el.dataset.si != null ? parseInt(el.dataset.si) : null;

  switch (action) {
    case 'toggle-edit':
      S.editMode = !S.editMode;
      if (S.editMode) {
        // Expand all blocks in edit mode so steps are visible
        S.blocks.forEach((_, i) => { S.collapsed[i] = false; });
      } else {
        S.collapsed = {};
      }
      render();
      break;

    case 'switch-discipline':
      showDisciplineModal();
      break;

    case 'toggle-collapse':
      if (bi !== null) {
        S.collapsed[bi] = S.collapsed[bi] !== false ? false : true;
        renderBlocks();
      }
      break;

    case 'toggle-step':
      // handled by change event
      break;

    case 'toggle-eq': {
      const eq = el.dataset.eq;
      S.eqFilter.has(eq) ? S.eqFilter.delete(eq) : S.eqFilter.add(eq);
      render();
      break;
    }

    case 'toggle-quiz':
      e.stopPropagation();
      if (bi !== null) {
        S.quizMode[bi] = !S.quizMode[bi];
        S.quizRevealed = {};
        renderBlocks();
      }
      break;

    case 'reveal-quiz':
      if (bi !== null && si !== null) {
        const key = `${bi}_${si}`;
        S.quizRevealed[key] = !S.quizRevealed[key];
        renderBlocks();
      }
      break;

    case 'start-fresh':
      S.checked = {};
      S.quizRevealed = {};
      saveState();
      render();
      break;

    case 'add-step':
      if (bi !== null) {
        S.blocks[bi].steps.push({ name: '', detail: '', emoji: '✨', tags: [] });
        saveState(); render();
      }
      break;

    case 'add-block':
      S.blocks.push({
        type: 'block', id: `block${Date.now()}`, title: 'New Block', emoji: '✨',
        equipment: [], color: 'var(--slate)', steps: []
      });
      saveState(); render();
      break;

    case 'save-routine':
      showSaveModal();
      break;

    case 'confirm-save': {
      const name = document.getElementById('saveNameInput').value.trim();
      if (!name) return;
      S.routineName = name;
      const id = saveRoutineToLibrary(name);
      S.routineId = id;
      saveState();
      document.getElementById('saveStatus').innerHTML = '<div class="success">Saved!</div>';
      setTimeout(closeModal, 1000);
      break;
    }

    case 'load-routines':
      showLibrary();
      break;

    case 'close-library':
      closeLibrary();
      break;

    case 'load-routine': {
      const rid = el.dataset.rid;
      loadRoutineFromLibrary(rid);
      closeLibrary();
      S.editMode = false;
      render();
      break;
    }

    case 'delete-routine': {
      const rid = el.dataset.rid;
      showConfirm('Delete this saved routine?', 'Delete', () => {
        deleteRoutineFromLibrary(rid);
        showLibrary();
      });
      break;
    }

    case 'new-pilates':
      showConfirm('Start new Pilates routine? Unsaved changes will be lost.', 'Start New', () => {
        S.blocks = JSON.parse(JSON.stringify(PILATES_DEFAULT.blocks));
        S.discipline = 'pilates'; S.routineName = 'Mat Pilates';
        S.checked = {}; S.collapsed = {}; S.quizMode = {}; S.routineId = null;
        saveState(); render();
      });
      break;

    case 'new-yoga':
      showConfirm('Start new Yoga routine? Unsaved changes will be lost.', 'Start New', () => {
        S.blocks = JSON.parse(JSON.stringify(YOGA_DEFAULT.blocks));
        S.discipline = 'yoga'; S.routineName = 'Yoga Sculpt';
        S.checked = {}; S.collapsed = {}; S.quizMode = {}; S.routineId = null;
        saveState(); render();
      });
      break;

    case 'new-blank':
      showConfirm('Start blank? Unsaved changes will be lost.', 'Start Blank', () => {
        S.blocks = [
          { type: 'block', id: 'warmup', title: 'Warm-up', emoji: '🌅', equipment: [], color: 'var(--amber)', steps: [] },
          { type: 'block', id: 'block1', title: 'Block 1', emoji: '✨', equipment: [], color: 'var(--slate)', steps: [] },
        ];
        S.discipline = 'custom'; S.routineName = 'My Routine';
        S.checked = {}; S.collapsed = {}; S.quizMode = {}; S.routineId = null;
        saveState(); render();
      });
      break;

    case 'switch-to-pilates':
      showConfirm('Switch to Pilates? Unsaved changes will be lost.', 'Switch', () => {
        S.blocks = JSON.parse(JSON.stringify(PILATES_DEFAULT.blocks));
        S.discipline = 'pilates'; S.routineName = 'Mat Pilates';
        S.checked = {}; S.collapsed = {}; S.quizMode = {}; S.routineId = null;
        closeModal(); saveState(); render();
      });
      break;

    case 'switch-to-yoga':
      showConfirm('Switch to Yoga? Unsaved changes will be lost.', 'Switch', () => {
        S.blocks = JSON.parse(JSON.stringify(YOGA_DEFAULT.blocks));
        S.discipline = 'yoga'; S.routineName = 'Yoga Sculpt';
        S.checked = {}; S.collapsed = {}; S.quizMode = {}; S.routineId = null;
        closeModal(); saveState(); render();
      });
      break;

    case 'close-modal':
      if (e.target.classList.contains('modal-overlay')) closeModal();
      break;

    // ---- Sheet actions ----
    case 'close-sheet':
      closeSheet();
      saveState(); render();
      break;

    case 'sheet-color': {
      const color = el.dataset.color;
      if (sheetContext && sheetContext.type === 'block') {
        S.blocks[sheetContext.bi].color = color;
        el.closest('.color-swatches').querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        saveState();
      }
      break;
    }

    case 'sheet-eq': {
      const eq = el.dataset.eq;
      if (sheetContext && sheetContext.type === 'block') {
        const block = S.blocks[sheetContext.bi];
        if (!block.equipment) block.equipment = [];
        const idx = block.equipment.indexOf(eq);
        idx >= 0 ? block.equipment.splice(idx, 1) : block.equipment.push(eq);
        el.classList.toggle('active');
        saveState();
      }
      break;
    }

    case 'sheet-emoji': {
      const emoji = el.dataset.emoji;
      if (sheetContext && sheetContext.type === 'block') {
        S.blocks[sheetContext.bi].emoji = emoji;
        el.closest('.emoji-grid').querySelectorAll('.emoji-pick').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('sheetBlockEmojiCustom').value = emoji;
        saveState();
      }
      break;
    }

    case 'sheet-step-emoji': {
      const emoji = el.dataset.emoji;
      if (sheetContext && sheetContext.type === 'step') {
        S.blocks[sheetContext.bi].steps[sheetContext.si].emoji = emoji;
        el.closest('.emoji-grid').querySelectorAll('.emoji-pick').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('sheetStepEmojiCustom').value = emoji;
        saveState();
      }
      break;
    }

    case 'sheet-toggle-pulse': {
      if (sheetContext && sheetContext.type === 'step') {
        const step = S.blocks[sheetContext.bi].steps[sheetContext.si];
        const tags = step.tags || [];
        const idx = tags.indexOf('pulse');
        idx >= 0 ? tags.splice(idx, 1) : tags.push('pulse');
        step.tags = tags;
        el.classList.toggle('active');
        el.querySelector('span:last-child').textContent = tags.includes('pulse') ? 'ON' : 'OFF';
        saveState();
      }
      break;
    }

    case 'sheet-move-up': {
      if (sheetContext && sheetContext.bi > 0) {
        const sbi = sheetContext.bi;
        [S.blocks[sbi - 1], S.blocks[sbi]] = [S.blocks[sbi], S.blocks[sbi - 1]];
        sheetContext.bi = sbi - 1;
        closeSheet(); saveState(); render();
        openBlockSheet(sbi - 1);
      }
      break;
    }

    case 'sheet-move-down': {
      if (sheetContext && sheetContext.bi < S.blocks.length - 1) {
        const sbi = sheetContext.bi;
        [S.blocks[sbi], S.blocks[sbi + 1]] = [S.blocks[sbi + 1], S.blocks[sbi]];
        sheetContext.bi = sbi + 1;
        closeSheet(); saveState(); render();
        openBlockSheet(sbi + 1);
      }
      break;
    }

    case 'sheet-duplicate': {
      if (sheetContext && sheetContext.type === 'block') {
        const sbi = sheetContext.bi;
        const copy = JSON.parse(JSON.stringify(S.blocks[sbi]));
        copy.id = `block${Date.now()}`;
        copy.title = copy.title + ' (copy)';
        delete copy.mirrorOf;
        S.blocks.splice(sbi + 1, 0, copy);
        closeSheet(); saveState(); render();
      }
      break;
    }

    case 'sheet-delete-block': {
      if (!sheetContext) break;
      showConfirm('Delete this block?', 'Delete', () => {
        S.blocks.splice(sheetContext.bi, 1);
        closeSheet(); saveState(); render();
      });
      break;
    }

    case 'sheet-step-move-up': {
      if (sheetContext && sheetContext.si > 0) {
        const { bi: sbi, si: ssi } = sheetContext;
        const steps = S.blocks[sbi].steps;
        [steps[ssi - 1], steps[ssi]] = [steps[ssi], steps[ssi - 1]];
        closeSheet(); saveState(); render();
        openStepSheet(sbi, ssi - 1);
      }
      break;
    }

    case 'sheet-step-move-down': {
      if (sheetContext) {
        const { bi: sbi, si: ssi } = sheetContext;
        const steps = S.blocks[sbi].steps;
        if (ssi < steps.length - 1) {
          [steps[ssi], steps[ssi + 1]] = [steps[ssi + 1], steps[ssi]];
          closeSheet(); saveState(); render();
          openStepSheet(sbi, ssi + 1);
        }
      }
      break;
    }

    case 'sheet-add-another': {
      if (sheetContext) {
        const sbi = sheetContext.bi;
        S.blocks[sbi].steps.push({ name: '', detail: '', emoji: '✨', tags: [] });
        const newSi = S.blocks[sbi].steps.length - 1;
        closeSheet(); saveState(); render();
        openStepSheet(sbi, newSi);
      }
      break;
    }

    case 'sheet-delete-step': {
      if (!sheetContext) break;
      showConfirm('Delete this step?', 'Delete', () => {
        S.blocks[sheetContext.bi].steps.splice(sheetContext.si, 1);
        closeSheet(); saveState(); render();
      });
      break;
    }

    case 'open-block-sheet':
      if (bi !== null) { e.stopPropagation(); openBlockSheet(bi); }
      break;

    case 'open-step-sheet':
      if (bi !== null && si !== null) openStepSheet(bi, si);
      break;

    case 'open-quick-add':
      if (bi !== null) openQuickAddSheet(bi);
      break;

    case 'confirm-quick-add': {
      if (sheetContext && sheetContext.type === 'quickadd') {
        const text = document.getElementById('sheetQuickAddText')?.value || '';
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) break;
        const sbi = sheetContext.bi;
        lines.forEach(line => {
          S.blocks[sbi].steps.push({ name: line, detail: '', emoji: '✨', tags: [] });
        });
        closeSheet(); saveState(); render();
      }
      break;
    }

    case 'open-quick-build':
      openQuickBuildSheet();
      break;

    case 'confirm-quick-build': {
      if (sheetContext && sheetContext.type === 'quickbuild') {
        const text = document.getElementById('sheetQuickBuildText')?.value || '';
        const lines = text.split('\n');
        const newBlocks = [];
        let currentBlock = null;
        let colorIdx = S.blocks.length;

        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed) return;

          if (trimmed === '---') {
            newBlocks.push({
              type: 'transition',
              id: `t${Date.now()}${Math.random().toString(36).slice(2,6)}`,
              title: 'Transition',
              emoji: '🔀',
              equipment: [],
              color: 'var(--surface2)',
              steps: []
            });
            currentBlock = null;
            return;
          }

          if (trimmed.startsWith('## ')) {
            const title = trimmed.slice(3).trim();
            currentBlock = {
              type: 'block',
              id: `block${Date.now()}${Math.random().toString(36).slice(2,6)}`,
              title: title || 'New Block',
              emoji: '✨',
              equipment: [],
              color: COLOR_CYCLE[colorIdx % COLOR_CYCLE.length],
              steps: []
            };
            colorIdx++;
            newBlocks.push(currentBlock);
            return;
          }

          if (!currentBlock) {
            currentBlock = {
              type: 'block',
              id: `block${Date.now()}${Math.random().toString(36).slice(2,6)}`,
              title: 'Block',
              emoji: '✨',
              equipment: [],
              color: COLOR_CYCLE[colorIdx % COLOR_CYCLE.length],
              steps: []
            };
            colorIdx++;
            newBlocks.push(currentBlock);
          }
          currentBlock.steps.push({ name: trimmed, detail: '', emoji: '✨', tags: [] });
        });

        if (newBlocks.length > 0) {
          S.blocks.push(...newBlocks);
          S.blocks.forEach((_, i) => { S.collapsed[i] = false; });
          closeSheet(); saveState(); render();
        }
      }
      break;
    }
  }
});

// Handle checkbox changes
document.addEventListener('change', (e) => {
  if (e.target.classList.contains('step-checkbox')) {
    const bi = parseInt(e.target.dataset.bi);
    const si = parseInt(e.target.dataset.si);
    const key = `${bi}_${si}`;
    e.target.checked ? (S.checked[key] = true) : delete S.checked[key];
    saveState();
    renderProgress();
    // Update just this row's style
    const row = e.target.closest('.step-row');
    if (row) row.classList.toggle('checked', e.target.checked);
  }
});

// Handle edit inputs — update state without re-render
document.addEventListener('input', (e) => {
  const { bi, si, field } = e.target.dataset;
  if (e.target.id === 'routineNameInput') {
    S.routineName = e.target.value;
    saveState();
    return;
  }
  if (bi != null && si != null && field) {
    const step = S.blocks[parseInt(bi)].steps[parseInt(si)];
    if (field === 'name') step.name = e.target.value;
    else if (field === 'detail') step.detail = e.target.value;
    else if (field === 'emoji') step.emoji = e.target.value;
    saveState();
    return;
  }
  // Sheet inputs
  if (e.target.id === 'sheetBlockTitle' && sheetContext && sheetContext.type === 'block') {
    S.blocks[sheetContext.bi].title = e.target.value;
    saveState(); return;
  }
  if (e.target.id === 'sheetBlockEmojiCustom' && sheetContext && sheetContext.type === 'block') {
    S.blocks[sheetContext.bi].emoji = e.target.value;
    saveState(); return;
  }
  if (e.target.id === 'sheetStepName' && sheetContext && sheetContext.type === 'step') {
    S.blocks[sheetContext.bi].steps[sheetContext.si].name = e.target.value;
    saveState(); return;
  }
  if (e.target.id === 'sheetStepDetail' && sheetContext && sheetContext.type === 'step') {
    S.blocks[sheetContext.bi].steps[sheetContext.si].detail = e.target.value;
    saveState(); return;
  }
  if (e.target.id === 'sheetStepEmojiCustom' && sheetContext && sheetContext.type === 'step') {
    S.blocks[sheetContext.bi].steps[sheetContext.si].emoji = e.target.value;
    saveState(); return;
  }
});

// New routine dropdown
document.addEventListener('click', (e) => {
  const newBtn = document.getElementById('newBtn');
  const newMenu = document.getElementById('newMenu');
  if (!newBtn || !newMenu) return;
  if (e.target === newBtn || newBtn.contains(e.target)) {
    e.stopPropagation();
    newMenu.classList.toggle('hidden');
  } else if (!newMenu.contains(e.target)) {
    newMenu.classList.add('hidden');
  }
});

// ===== INIT =====
loadState();
render();
</script>
